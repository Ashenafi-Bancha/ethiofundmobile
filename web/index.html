<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="EthioFund">
  <link rel="apple-touch-icon" href="assets/images/ethiofund_logo.png">

  <!-- Favicon (uses packaged asset) -->
  <link rel="icon" type="image/png" href="assets/images/ethiofund_logo.png"/>

  <title>EthioFund</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Lightweight splash shown while Flutter initializes -->
  <style>
    #splash {
      display:flex;align-items:center;justify-content:center;height:100vh;width:100vw;background:#ffffff;
      margin:0;padding:0;overflow:hidden;
    }
    #splash img{max-width:40vmin;max-height:40vmin}
  </style>
  <div id="splash"><img src="assets/images/ethiofund_logo.png" alt="EthioFund"/></div>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Remove the splash element once Flutter has initialized and replaced the DOM.
    window.addEventListener('flutter-first-frame', () => {
      const s = document.getElementById('splash');
      if (s) s.style.display = 'none';
    });
    // Fallback: remove splash after 8s in case event is not fired
    setTimeout(()=>{const s=document.getElementById('splash'); if(s) s.style.display='none';},8000);
  </script>
</body>
</html>
